<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI日报封面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#111;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.cover{width:1080px;height:608px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 40%,#0f172a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:60px 80px}
.cover::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(circle,rgba(59,130,246,.06) 1px,transparent 1px);background-size:40px 40px}
.cover::after{content:'';position:absolute;top:-40%;right:-20%;width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,.12),transparent 70%);border-radius:50%}
.date{font-size:32px;color:rgba(255,255,255,.5);z-index:1;margin-bottom:40px;letter-spacing:2px}
.headline{font-size:48px;font-weight:800;color:#fff;z-index:1;line-height:1.4;text-align:center;max-width:900px}
.headline em{font-style:normal;color:#60a5fa}
.accent{position:absolute;bottom:0;left:0;width:100%;height:4px;background:linear-gradient(90deg,#3b82f6,#8b5cf6,#ec4899)}
</style>
</head>
<body>
<div class="cover">
  <!-- ✏️ 修改这里 -->
  <div class="date">2026年4月14日（周二）</div>
  <div class="headline">微软Copilot变<em>"始终在线"</em>AI代理团队</div>
  <div class="accent"></div>
</div>
</body>
</html>
