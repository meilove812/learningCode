let currentUnit = 0, displayWords = [], autoplayTimer = null, autoplayIndex = 0;
let cachedVoices = { en: null, zh: null };
function loadVoices() { const voices = speechSynthesis.getVoices(); if (!voices.length) return; const enV = voices.filter(v => v.lang.startsWith('en')); cachedVoices.en = [enV.find(v => v.name === 'Samantha'), enV.find(v => v.name === 'Google UK English Female'), enV.find(v => v.localService), enV[0]].find(v => v) || null; const zhV = voices.filter(v => v.lang.startsWith('zh') || v.lang.startsWith('cmn')); cachedVoices.zh = [zhV.find(v => v.name === 'Ting-Ting'), zhV.find(v => v.localService), zhV[0]].find(v => v) || null; }
speechSynthesis.onvoiceschanged = loadVoices; loadVoices();
function speak(text, lang) { if (!window.speechSynthesis) return; speechSynthesis.cancel(); const isZh = lang === 'zh' || (!lang && /[\u4e00-\u9fff]/.test(text)); const u = new SpeechSynthesisUtterance(text); u.lang = isZh ? 'zh-CN' : 'en-US'; u.rate = isZh ? 0.9 : 0.75; const voice = isZh ? cachedVoices.zh : cachedVoices.en; if (voice) u.voice = voice; speechSynthesis.speak(u); }
function buildNav() { const nav = document.getElementById('nav'); let html = `<button class="nav-btn active" style="background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:white" onclick="selectUnit(0)">🌈 全部 (${UNITS.reduce((s,u)=>s+u.words.length,0)}词)</button>`; UNITS.forEach(u => { html += `<button class="nav-btn" data-unit="${u.id}" onclick="selectUnit(${u.id})">${u.emoji} U${u.id} ${u.name}</button>`; }); nav.innerHTML = html; }
function selectUnit(id) { currentUnit = id; stopAutoplay(); document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('active'); b.style.background = 'white'; b.style.color = '#555'; }); if (id === 0) { const b = document.querySelector('.nav-btn'); b.classList.add('active'); b.style.background = 'linear-gradient(135deg,#7c3aed,#8b5cf6)'; b.style.color = 'white'; } else { const b = document.querySelector(`.nav-btn[data-unit="${id}"]`); const u = UNITS.find(u => u.id === id); b.classList.add('active'); b.style.background = u.color; b.style.color = 'white'; } renderCards(); updateInfo(); }
function updateInfo() { const el = document.getElementById('unitInfo'); if (currentUnit === 0) el.textContent = `📚 全部 ${UNITS.reduce((s,u)=>s+u.words.length,0)} 个单词 · ${UNITS.length} 个单元`; else { const u = UNITS.find(u => u.id === currentUnit); el.textContent = `${u.emoji} Unit ${u.id}: ${u.name} · ${u.words.length} 个单词`; } }
function getWords() { if (currentUnit === 0) return UNITS.flatMap(u => u.words.map(w => ({...w, unitColor: u.color}))); const u = UNITS.find(u => u.id === currentUnit); return u.words.map(w => ({...w, unitColor: u.color})); }
function renderCards() { displayWords = getWords(); const grid = document.getElementById('cardGrid'); grid.innerHTML = displayWords.map((w, i) => `<div class="card-wrapper" onclick="flipCard(this)"><div class="card" data-index="${i}"><div class="card-face card-front"><span class="card-num">${i+1}</span><button class="speak-btn" onclick="event.stopPropagation();speak('${w.en.replace(/'/g,"\\'")}','en')">🔊</button><span class="card-emoji">${w.em}</span><span class="card-word">${w.en}</span><span class="card-phonetic">${w.ph}</span><span class="card-hint">👆 点击翻转</span></div><div class="card-face card-back"><button class="speak-btn" onclick="event.stopPropagation();speak('${w.zh.replace(/'/g,"\\'")}','zh')">🔊</button><span class="card-zh">${w.zh}</span><div class="card-example">📖 ${w.ex}</div><div class="card-example-zh">${w.exZh}</div></div></div></div>`).join(''); }
function flipCard(wrapper) { wrapper.querySelector('.card').classList.toggle('flipped'); }
function flipAll(show) { document.querySelectorAll('.card').forEach(c => { if (show) c.classList.add('flipped'); else c.classList.remove('flipped'); }); }
function shuffleCards() { stopAutoplay(); displayWords.sort(() => Math.random() - 0.5); const grid = document.getElementById('cardGrid'); grid.innerHTML = displayWords.map((w, i) => `<div class="card-wrapper" onclick="flipCard(this)"><div class="card" data-index="${i}"><div class="card-face card-front"><span class="card-num">${i+1}</span><button class="speak-btn" onclick="event.stopPropagation();speak('${w.en.replace(/'/g,"\\'")}','en')">🔊</button><span class="card-emoji">${w.em}</span><span class="card-word">${w.en}</span><span class="card-phonetic">${w.ph}</span><span class="card-hint">👆 点击翻转</span></div><div class="card-face card-back"><button class="speak-btn" onclick="event.stopPropagation();speak('${w.zh.replace(/'/g,"\\'")}','zh')">🔊</button><span class="card-zh">${w.zh}</span><div class="card-example">📖 ${w.ex}</div><div class="card-example-zh">${w.exZh}</div></div></div></div>`).join(''); }
function toggleAutoplay() { const btn = document.getElementById('autoplayBtn'); if (autoplayTimer) { stopAutoplay(); } else { flipAll(false); autoplayIndex = 0; btn.textContent = '⏹️ 停止播放'; btn.classList.add('playing'); playNext(); } }
function stopAutoplay() { clearTimeout(autoplayTimer); autoplayTimer = null; autoplayIndex = 0; const btn = document.getElementById('autoplayBtn'); btn.textContent = '▶️ 连续播放'; btn.classList.remove('playing'); speechSynthesis.cancel(); }
function playNext() { if (autoplayIndex >= displayWords.length) { stopAutoplay(); return; } const cards = document.querySelectorAll('.card'); const card = cards[autoplayIndex]; if (!card) { stopAutoplay(); return; } card.parentElement.scrollIntoView({ behavior: 'smooth', block: 'center' }); setTimeout(() => { card.classList.add('flipped'); const w = displayWords[autoplayIndex]; speak(w.en, 'en'); autoplayTimer = setTimeout(() => { speak(w.zh, 'zh'); autoplayTimer = setTimeout(() => { autoplayIndex++; playNext(); }, 2000); }, 2000); }, 500); }
buildNav(); renderCards(); updateInfo();
