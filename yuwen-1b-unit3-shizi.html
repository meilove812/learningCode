<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>一年级下册·第三单元识字卡 | Coco Learning Park</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#fdf2f8,#ede9fe,#e0f2fe,#ecfdf5);min-height:100vh;padding:12px;position:relative}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(circle,rgba(139,92,246,.06) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;z-index:0}
h1{text-align:center;font-size:1.4em;margin:8px 0;color:#6b21a8;position:relative;z-index:1}
.progress{text-align:center;font-size:.95em;color:#7c3aed;margin:4px 0 8px;position:relative;z-index:1}
.filters{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:10px 0;position:relative;z-index:1}
.filters button{border:none;border-radius:20px;padding:8px 16px;font-size:1em;cursor:pointer;background:#e2e8f0;color:#475569;transition:.2s}
.filters button.active{color:#fff;transform:scale(1.05)}
.controls{display:flex;justify-content:center;align-items:center;gap:10px;margin:8px 0;flex-wrap:wrap;position:relative;z-index:1}
.start-btn{border:none;border-radius:28px;padding:12px 28px;font-size:1.15em;cursor:pointer;background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;font-weight:700;box-shadow:0 4px 14px rgba(139,92,246,.3)}
.settings-toggle{border:none;background:none;font-size:1em;cursor:pointer;color:#94a3b8;padding:4px 8px}
.settings-panel{display:none;justify-content:center;gap:12px;margin:6px 0;position:relative;z-index:1}
.settings-panel.show{display:flex;flex-wrap:wrap;align-items:center}
.speed-btn{border:2px solid #e2e8f0;border-radius:16px;padding:6px 14px;font-size:.95em;cursor:pointer;background:#fff;color:#64748b;transition:.2s}
.speed-btn.active{border-color:#8b5cf6;background:#f5f3ff;color:#7c3aed;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;max-width:720px;margin:10px auto;padding:0 8px;position:relative;z-index:1}
.card-container{width:150px;height:250px;perspective:800px;justify-self:center}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:transform .5s ease;cursor:pointer;border-radius:14px}
.card.flipped{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
.card-face{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;align-items:center}
.card-front{background:#fff;justify-content:center;z-index:2}
.card.flipped .card-front{z-index:0}
.card-back{z-index:0}
.card.flipped .card-back{z-index:2}
.card-back{background:#fff;transform:rotateY(180deg);-webkit-transform:rotateY(180deg);justify-content:center;padding:12px 8px 10px}
.card-front .lesson-tag{position:absolute;top:6px;left:6px;font-size:.55em;padding:2px 7px;border-radius:10px;color:#fff;font-weight:600}
.card-front .tian-wrap{position:relative;width:100px;height:100px;margin-top:6px}
.card-front .tian-wrap svg{position:absolute;top:0;left:0}
.card-front .tian-char{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3.5em;font-family:'KaiTi','STKaiti','楷体',serif;line-height:1;z-index:1;color:#333}
.card-front .big-char{font-size:4.5em;font-family:'KaiTi','STKaiti','楷体',serif;color:#333;line-height:1}
.card-front .speak-btn{position:absolute;bottom:28px;right:8px;width:36px;height:36px;border-radius:50%;border:none;font-size:1.1em;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.card-front .flip-hint{position:absolute;bottom:6px;font-size:.75em;color:#999;animation:bounce 1.5s infinite}
.card-back .pinyin{font-size:1.4em;font-weight:700;margin-bottom:4px}
.card-back .ciyu{font-size:1.1em;color:#666;margin-bottom:8px}
.card-back .btns{display:flex;gap:8px;margin-top:auto;flex-wrap:wrap;justify-content:center}
.card-back .btns button{border:none;border-radius:12px;padding:8px 14px;font-size:.9em;cursor:pointer;color:#fff;min-height:40px}
.card-back .watermark{position:absolute;bottom:4px;right:8px;font-size:3em;opacity:.06;font-family:'KaiTi','STKaiti','楷体',serif}
.card-container.highlight .card{box-shadow:0 0 16px 4px rgba(139,92,246,.5);transform:scale(1.08)}
.card-container.highlight .card.flipped{transform:rotateY(180deg) scale(1.08)}
@keyframes starFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(1.3)}}
.star-float{position:absolute;top:8px;right:8px;font-size:1.1em;pointer-events:none;z-index:10;animation:starFloat .8s ease forwards}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:100;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:18px;padding:16px;max-width:340px;width:92%;text-align:center;position:relative;max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:8px;font-size:1.2em}
.modal .close-btn{position:absolute;top:8px;right:12px;font-size:1.4em;cursor:pointer;border:none;background:none;color:#999}
.quiz-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px auto;max-width:280px}
.quiz-grid button{min-height:80px;font-size:3em;font-family:'KaiTi','STKaiti','楷体',serif;border:3px solid #e2e8f0;border-radius:14px;background:#fff;cursor:pointer;transition:.2s;color:#333}
.quiz-grid button:active{transform:scale(.95)}
.quiz-grid button.correct{background:#dcfce7;border-color:#22c55e;color:#16a34a}
.quiz-grid button.wrong{background:#fee2e2;border-color:#ef4444;color:#ef4444}
.quiz-result{font-size:1.3em;margin-top:10px;min-height:1.5em}
.reward{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4em;z-index:200;pointer-events:none;animation:rewardPop .8s ease forwards}
@keyframes rewardPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}60%{transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1) translateY(-40px)}}
.stroke-modal-content{display:flex;flex-direction:column;align-items:center;gap:8px}
.stroke-tian{position:relative;width:min(280px,calc(100vw - 48px));aspect-ratio:1;margin:0 auto;background:#fff;border:3px solid #e53935;border-radius:4px}
.stroke-tian svg.tian-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.stroke-tian #strokeTarget{position:relative;z-index:1}
.stroke-hint{font-size:.9em;color:#888;margin-top:4px}
.stroke-btns{display:flex;gap:10px;margin-top:6px}
.stroke-btns button{border:none;border-radius:12px;padding:8px 18px;font-size:1em;cursor:pointer;color:#fff;background:linear-gradient(135deg,#8b5cf6,#6366f1)}
footer{text-align:center;font-size:.75em;color:#94a3b8;margin:16px 0 8px;position:relative;z-index:1}
</style>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
</head>
<body>
<h1>📖 第三单元 · 识字卡 👀</h1>
<p style="text-align:center;color:#888;font-size:.85em;margin-bottom:4px;position:relative;z-index:1">一年级下册识字表 · 翻牌认字 · 朗读 · 认读测试</p>
<div class="progress" id="progress">已翻开 <span id="flipCount">0</span>/41 个字 ⭐</div>
<div class="filters" id="filters"></div>
<div class="controls">
  <button class="start-btn" onclick="playAll()">▶️ 开始学习！</button>
  <button class="settings-toggle" onclick="toggleSettings()">⚙️设置</button>
</div>
<div class="settings-panel" id="settingsPanel">
  <span style="font-size:.85em;color:#64748b">语速：</span>
  <button class="speed-btn" data-rate="0.5" onclick="setSpeed(this)">🐢慢</button>
  <button class="speed-btn active" data-rate="0.7" onclick="setSpeed(this)">🐰正常</button>
  <button class="speed-btn" data-rate="1.0" onclick="setSpeed(this)">🐆快</button>
</div>
<div class="grid" id="grid"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeQuizModal()">✕</button>
    <h3 id="modalTitle"></h3>
    <div class="quiz-grid" id="quizGrid"></div>
    <div class="quiz-result" id="quizResult"></div>
  </div>
</div>
<div class="modal-overlay" id="strokeOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeStrokeModal()">✕</button>
    <h3 id="strokeTitle">✏️ 笔顺</h3>
    <p class="stroke-hint">👀 看老师写</p>
    <div class="stroke-modal-content">
      <div class="stroke-tian" id="strokeTian">
        <svg class="tian-bg" viewBox="0 0 100 100" preserveAspectRatio="none"><rect x="1" y="1" width="98" height="98" fill="none" stroke="#e53935" stroke-width="1.5"/><line x1="50" y1="1" x2="50" y2="99" stroke="#ddd" stroke-width="0.6" stroke-dasharray="3,2"/><line x1="1" y1="50" x2="99" y2="50" stroke="#ddd" stroke-width="0.6" stroke-dasharray="3,2"/></svg>
        <div id="strokeTarget"></div>
      </div>
      <div class="stroke-btns">
        <button onclick="replayStroke()">✏️ 笔顺</button>
        <button onclick="replayStroke()">🔄 重播</button>
      </div>
    </div>
  </div>
</div>
<footer>🦎 Coco Learning Park · 人教版2024新课标</footer>

<script>
var lessons=[
  {name:'4.小公鸡和小鸭子',emoji:'🐤',color:['#F59E0B','#FBBF24'],chars:[['玩','wán','玩耍'],['的','de','我的'],['背','bèi','背后'],['肖','xiào','相肖'],['快','kuài','快乐'],['已','jǐ','已经']]},
  {name:'5.树和喜鹊',emoji:'🐦',color:['#22C55E','#4ADE80'],chars:[['只','zhī','一只'],['很','hěn','很好'],['狐','hú','狐狸'],['跳','tiào','跳跃'],['独','dú','独自'],['孤','gū','孤独'],['绳','shéng','绳子'],['当','dāng','当时'],['种','zhǒng','种类'],['海','hǎi','大海'],['单','dān','单独'],['跑','pǎo','跑步'],['呼','hū','呼叫'],['叫','jiào','叫声'],['招','zhāo','招手'],['球','qiú','足球'],['羽','yǔ','羽毛'],['轮','lún','轮子'],['排','pái','排队']]},
  {name:'6.怎么都快乐',emoji:'😄',color:['#EC4899','#F472B6'],chars:[['乐','lè','快乐'],['邻','lín','邻居'],['居','jū','居住'],['都','dōu','都是'],['每','měi','每天'],['还','hái','还有'],['这','zhè','这个']]},
  {name:'语文园地三',emoji:'🌿',color:['#6366F1','#818CF8'],chars:[['只','zhǐ','只有'],['页','yè','页码'],['止','zhǐ','停止'],['望','wàng','希望'],['丁','dīng','园丁'],['寸','cùn','尺寸'],['千','qiān','千万'],['全','quán','全部'],['旦','dàn','元旦']]}
];
var currentFilter='全部',speechRate=0.7;
var flippedSet=new Set();
var totalChars=41;
var allCharsInUnit=[];
lessons.forEach(function(l){l.chars.forEach(function(c){allCharsInUnit.push(c[0])});});

function updateProgress(){
  var count=flippedSet.size;
  var p=document.getElementById('progress');
  if(count>=totalChars)p.innerHTML='已翻开 <span id="flipCount">'+count+'</span>/'+totalChars+' 个字 🎉全部完成！';
  else if(count>=Math.floor(totalChars*0.7))p.innerHTML='已翻开 <span id="flipCount">'+count+'</span>/'+totalChars+' 个字 ⭐⭐';
  else if(count>=Math.floor(totalChars*0.35))p.innerHTML='已翻开 <span id="flipCount">'+count+'</span>/'+totalChars+' 个字 🌟';
  else p.innerHTML='已翻开 <span id="flipCount">'+count+'</span>/'+totalChars+' 个字 ⭐';
}
function showStarFloat(container){
  var s=document.createElement('span');s.className='star-float';s.textContent='+1⭐';
  container.style.position='relative';container.appendChild(s);
  setTimeout(function(){s.remove()},900);
}
function toggleSettings(){document.getElementById('settingsPanel').classList.toggle('show')}
function setSpeed(btn){
  document.querySelectorAll('.speed-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');speechRate=parseFloat(btn.dataset.rate);
}
function buildFilters(){
  var f=document.getElementById('filters');
  var allBtn=document.createElement('button');
  allBtn.textContent='📚全部('+totalChars+')';
  allBtn.classList.add('active');
  allBtn.style.background='linear-gradient(135deg,#8b5cf6,#6366f1)';allBtn.style.color='#fff';
  allBtn.onclick=function(){
    currentFilter='全部';
    f.querySelectorAll('button').forEach(function(x){x.classList.remove('active');x.style.background='#e2e8f0';x.style.color='#475569'});
    allBtn.classList.add('active');allBtn.style.background='linear-gradient(135deg,#8b5cf6,#6366f1)';allBtn.style.color='#fff';
    buildGrid();
  };
  f.appendChild(allBtn);
  lessons.forEach(function(l){
    var b=document.createElement('button');
    b.textContent=l.emoji+l.name.replace(/^\d\./,'')+'('+l.chars.length+')';
    b.onclick=function(){
      currentFilter=l.name;
      f.querySelectorAll('button').forEach(function(x){x.classList.remove('active');x.style.background='#e2e8f0';x.style.color='#475569'});
      b.classList.add('active');b.style.background='linear-gradient(135deg,'+l.color[0]+','+l.color[1]+')';b.style.color='#fff';
      buildGrid();
    };
    f.appendChild(b);
  });
}
function buildGrid(){
  var g=document.getElementById('grid');g.innerHTML='';
  lessons.forEach(function(lesson){
    if(currentFilter!=='全部'&&currentFilter!==lesson.name)return;
    lesson.chars.forEach(function(c){
      var container=document.createElement('div');container.className='card-container';
      container.dataset.char=c[0];container.dataset.lesson=lesson.name;
      var card=document.createElement('div');card.className='card';
      if(flippedSet.has(c[0]))card.classList.add('flipped');
      card.style.border='3px solid '+lesson.color[0];card.style.borderRadius='14px';
      var front=document.createElement('div');front.className='card-face card-front';
      front.style.background='linear-gradient(135deg,'+lesson.color[0]+'12,'+lesson.color[1]+'08)';
      front.innerHTML='<span class="lesson-tag" style="background:linear-gradient(135deg,'+lesson.color[0]+','+lesson.color[1]+')">'+lesson.name.replace(/^\d\./,'')+'</span>'
        +'<div class="tian-wrap"><svg viewBox="0 0 100 100" width="100" height="100"><rect x="1" y="1" width="98" height="98" fill="none" stroke="#e53935" stroke-width="2"/><line x1="50" y1="1" x2="50" y2="99" stroke="#ccc" stroke-width="0.8" stroke-dasharray="4,3"/><line x1="1" y1="50" x2="99" y2="50" stroke="#ccc" stroke-width="0.8" stroke-dasharray="4,3"/></svg><span class="tian-char">'+c[0]+'</span></div>'
        +'<button class="speak-btn" style="background:'+lesson.color[0]+'20" data-char="'+c[0]+'" data-ciyu="'+c[2]+'">🔊</button>'
        +'<span class="flip-hint">👆 点我翻转</span>';
      var back=document.createElement('div');back.className='card-face card-back';
      back.style.background='linear-gradient(135deg,'+lesson.color[0]+'15,'+lesson.color[1]+'10)';
      back.innerHTML='<div class="pinyin" style="color:'+lesson.color[0]+'">'+c[1]+'</div>'
        +'<div class="ciyu">'+c[2]+'</div>'
        +'<div class="btns">'
        +'<button style="background:linear-gradient(135deg,'+lesson.color[0]+','+lesson.color[1]+')" data-action="speak" data-char="'+c[0]+'" data-ciyu="'+c[2]+'">🔊 朗读</button>'
        +'<button style="background:linear-gradient(135deg,'+lesson.color[0]+','+lesson.color[1]+')" data-action="stroke" data-char="'+c[0]+'">✏️ 笔顺</button>'
        +'<button style="background:linear-gradient(135deg,'+lesson.color[0]+','+lesson.color[1]+')" data-action="test" data-char="'+c[0]+'" data-pinyin="'+c[1]+'" data-ciyu="'+c[2]+'">🎯 测试</button>'
        +'</div>'
        +'<span class="watermark">'+c[0]+'</span>';
      card.appendChild(front);card.appendChild(back);container.appendChild(card);
      card.onclick=function(e){
        if(e.target.closest('button'))return;
        var wasFlipped=card.classList.contains('flipped');
        card.classList.toggle('flipped');
        if(!wasFlipped&&!flippedSet.has(c[0])){flippedSet.add(c[0]);updateProgress();showStarFloat(container)}
      };
      container.querySelectorAll('button').forEach(function(btn){
        btn.onclick=function(e){
          e.stopPropagation();
          var a=btn.dataset.action;
          if(!a){speakChar(btn.dataset.char,btn.dataset.ciyu);return}
          if(a==='speak')speakChar(btn.dataset.char,btn.dataset.ciyu);
          else if(a==='stroke')openStroke(btn.dataset.char);
          else if(a==='test')openQuiz(btn.dataset.char,btn.dataset.pinyin,btn.dataset.ciyu);
        };
      });
      g.appendChild(container);
    });
  });
}
function speakChar(ch,ciyu){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u1=new SpeechSynthesisUtterance(ch);u1.lang='zh-CN';u1.rate=speechRate;
  var u2=new SpeechSynthesisUtterance(ciyu);u2.lang='zh-CN';u2.rate=speechRate;
  u1.onend=function(){window.speechSynthesis.speak(u2)};
  window.speechSynthesis.speak(u1);
}
function openQuiz(ch,pinyin,ciyu){
  document.getElementById('modalTitle').textContent='🎯 听一听，选一选';
  document.getElementById('quizResult').textContent='';
  var grid=document.getElementById('quizGrid');grid.innerHTML='';
  var others=allCharsInUnit.filter(function(x){return x!==ch});
  for(var i=others.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=others[i];others[i]=others[j];others[j]=t}
  var choices=[ch,others[0],others[1],others[2]];
  for(var i=choices.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=choices[i];choices[i]=choices[j];choices[j]=t}
  var answered=false;
  choices.forEach(function(opt){
    var btn=document.createElement('button');btn.textContent=opt;
    btn.onclick=function(){
      if(answered)return;answered=true;
      if(opt===ch){
        btn.classList.add('correct');
        document.getElementById('quizResult').textContent='⭐ 太棒了！';
        showReward();
      }else{
        btn.classList.add('wrong');
        grid.querySelectorAll('button').forEach(function(b){if(b.textContent===ch)b.classList.add('correct')});
        document.getElementById('quizResult').textContent='再听一遍～正确答案是「'+ch+'」';
        setTimeout(function(){speakChar(ch,ciyu)},500);
      }
    };
    grid.appendChild(btn);
  });
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(function(){speakChar(ch,ciyu)},300);
}
function showReward(){
  var d=document.createElement('div');d.className='reward';
  d.textContent=['⭐🎉','🌟✨','🎊👏','💪🌈'][Math.floor(Math.random()*4)];
  document.body.appendChild(d);setTimeout(function(){d.remove()},1500);
}
function closeQuizModal(){document.getElementById('modalOverlay').classList.remove('show')}
function playAll(){
  var cards=document.querySelectorAll('.card-container');
  var visible=[];cards.forEach(function(c){if(c.offsetParent!==null)visible.push(c)});
  if(!visible.length)return;
  var i=0;
  function next(){
    if(i>=visible.length)return;
    visible.forEach(function(c){c.classList.remove('highlight')});
    var c=visible[i];c.classList.add('highlight');
    c.scrollIntoView({behavior:'smooth',block:'center'});
    var ch=c.dataset.char;
    var lesson=lessons.find(function(l){return l.name===c.dataset.lesson});
    var charData=lesson?lesson.chars.find(function(x){return x[0]===ch}):null;
    speakChar(ch,charData?charData[2]:ch);
    setTimeout(function(){c.classList.remove('highlight');i++;setTimeout(next,300)},2000);
  }
  next();
}
document.getElementById('modalOverlay').onclick=function(e){if(e.target===this)closeQuizModal()};
var currentWriter=null;
function openStroke(ch){
  document.getElementById('strokeTitle').textContent='✏️ '+ch+' 笔顺';
  document.getElementById('strokeTarget').innerHTML='';
  document.getElementById('strokeOverlay').classList.add('show');
  setTimeout(function(){
    var tian=document.getElementById('strokeTian');
    var w=tian.offsetWidth;
    currentWriter=HanziWriter.create('strokeTarget',ch,{width:w,height:w,padding:10,strokeColor:'#333',delayBetweenStrokes:300,strokeAnimationSpeed:1});
    currentWriter.animateCharacter();
  },100);
}
function replayStroke(){if(currentWriter)currentWriter.animateCharacter()}
function closeStrokeModal(){
  document.getElementById('strokeOverlay').classList.remove('show');
  document.getElementById('strokeTarget').innerHTML='';currentWriter=null;
}
document.getElementById('strokeOverlay').onclick=function(e){if(e.target===this)closeStrokeModal()};
buildFilters();buildGrid();
</script>
</body>
</html>
