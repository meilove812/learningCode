<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 数学思维训练</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #e0f0ff 0%, #f0e6ff 50%, #fff5e6 100%); min-height:100vh; padding:12px; }
.header { text-align:center; padding:16px 0 8px; }
.header h1 { font-size:1.6em; }
.tabs { display:flex; gap:8px; justify-content:center; margin:12px 0; flex-wrap:wrap; }
.tab { padding:10px 18px; border-radius:20px; border:none; font-size:1em; cursor:pointer; font-weight:600; transition:.2s; }
.tab.active { transform:scale(1.05); color:#fff; }
.tab[data-t="0"] { background:#d0e8ff; color:#2a6cb8; }
.tab[data-t="0"].active { background:#3b82f6; }
.tab[data-t="1"] { background:#d0f0d0; color:#2a8a2a; }
.tab[data-t="1"].active { background:#22c55e; }
.tab[data-t="2"] { background:#ffe8cc; color:#c06000; }
.tab[data-t="2"].active { background:#f59e0b; }
.card { background:#fff; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,.08); padding:20px; margin:0 auto 16px; max-width:600px; }
.question-box { background:linear-gradient(135deg,#f8f9ff,#fff); border:2px dashed #c0c8e0; border-radius:12px; padding:16px; margin-bottom:16px; font-size:1.05em; line-height:1.7; }
.step { display:none; animation: fadeIn .4s; }
.step.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.teacher { background:#f0f7ff; border-radius:12px; padding:12px 14px; margin-bottom:12px; font-size:1em; line-height:1.6; border-left:4px solid #3b82f6; cursor:pointer; }
.teacher.green { background:#f0fff0; border-left-color:#22c55e; }
.teacher.orange { background:#fff8f0; border-left-color:#f59e0b; }
.emoji-area { background:#f8faff; border-radius:12px; padding:14px; margin:10px 0; min-height:50px; display:flex; flex-wrap:wrap; gap:4px; align-items:center; transition: all .3s; }
.emoji-area.bus { background:linear-gradient(135deg,#e8f4fd,#d0e8ff); border:2px solid #90c0f0; }
.emoji-area.bucket { background:linear-gradient(135deg,#e8fde8,#d0f0d8); border:2px solid #90d090; }
.emoji-area.tree-area { background:linear-gradient(135deg,#fdf8e8,#f0e8d0); border:2px solid #d0c090; }
.ej { font-size:1.1em; display:inline-flex; width:36px; height:36px; align-items:center; justify-content:center; border-radius:50%; transition: all .5s; position:relative; border:2px solid transparent; }
.ej.blue-bg { background:#E3F2FD; border-color:#1976D2; }
.ej.green-bg { background:#E8F5E9; border-color:#388E3C; }
.ej.red-bg { background:#FFEBEE; border-color:#D32F2F; }
.ej.fade-out { opacity:0; transform:scale(.3); width:0; margin:0; padding:0; overflow:hidden; }
.ej.fly-in { animation: flyIn .6s ease-out; }
@keyframes flyIn { from{opacity:0;transform:translateX(40px) scale(.5)} to{opacity:1;transform:none} }
.ej.pop-in { animation: popIn .4s ease-out; }
@keyframes popIn { from{opacity:0;transform:scale(0)} to{opacity:1;transform:scale(1)} }
.label { font-size:.75em; color:#888; text-align:center; margin-top:4px; }
.input-row { display:flex; align-items:center; gap:10px; margin:12px 0; flex-wrap:wrap; }
.input-row input { width:80px; height:44px; font-size:1.3em; text-align:center; border:2px solid #c0c8e0; border-radius:12px; outline:none; }
.input-row input:focus { border-color:#3b82f6; }
.btn { padding:10px 22px; border-radius:12px; border:none; font-size:1em; font-weight:600; cursor:pointer; transition:.2s; }
.btn:active { transform:scale(.95); }
.btn-blue { background:#3b82f6; color:#fff; }
.btn-green { background:#22c55e; color:#fff; }
.btn-orange { background:#f59e0b; color:#fff; }
.btn-gray { background:#e0e0e0; color:#666; }
.feedback { padding:10px 14px; border-radius:10px; margin:8px 0; font-weight:600; font-size:1em; display:none; }
.feedback.correct { display:block; background:#d0ffd0; color:#16a34a; }
.feedback.wrong { display:block; background:#ffe0e0; color:#dc2626; }
.summary-card { background:linear-gradient(135deg,#fffde0,#fff8cc); border:2px solid #f0d860; border-radius:14px; padding:16px; margin-top:14px; text-align:center; font-size:1.1em; line-height:1.8; }
.progress { display:flex; gap:6px; justify-content:center; margin:10px 0; }
.dot { width:12px; height:12px; border-radius:50%; background:#ddd; transition:.3s; }
.dot.done { background:#22c55e; }
.dot.current { background:#3b82f6; transform:scale(1.3); }
.speak-btn { background:none; border:none; font-size:1.3em; cursor:pointer; vertical-align:middle; }
.next-btn { display:block; margin:14px auto 0; }
.section-title { font-size:1.1em; font-weight:700; margin:18px 0 8px; text-align:center; }
.practice-card { background:#fff; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,.08); padding:20px; margin:16px auto; max-width:600px; display:none; }
.confetti { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; display:none; }
.footer { text-align:center; padding:20px 0 10px; color:#aaa; font-size:.85em; }
.row-label { font-size:.8em; color:#999; margin:4px 0 2px; }
.half-container { display:flex; align-items:center; gap:0; margin:10px 0; }
.half-side { flex:1; display:flex; flex-wrap:wrap; gap:4px; padding:10px; background:#f8faff; border-radius:12px; min-height:50px; align-items:center; justify-content:center; }
.half-side.bucket-left { background:linear-gradient(135deg,#e8fde8,#d0f0d8); border:2px solid #90d090; border-right:none; border-radius:12px 0 0 12px; }
.half-side.bucket-right { background:linear-gradient(135deg,#e8fde8,#d0f0d8); border:2px solid #90d090; border-left:none; border-radius:0 12px 12px 0; }
.half-divider { width:3px; background:repeating-linear-gradient(to bottom, #888 0,#888 6px,transparent 6px,transparent 12px); min-height:60px; flex-shrink:0; }
.half-label { text-align:center; font-size:.85em; color:#666; font-weight:600; margin-top:2px; }
.tree-group { display:flex; justify-content:center; gap:16px; flex-wrap:wrap; margin:10px 0; }
.tree-col { display:flex; flex-direction:column; align-items:center; min-width:70px; }
.tree-birds { display:flex; flex-wrap:wrap; gap:2px; justify-content:center; margin-bottom:4px; min-height:40px; max-width:80px; }
.tree { display:flex; flex-direction:column; align-items:center; }
.tree-crown { width:50px; height:40px; background:#4CAF50; border-radius:50%; position:relative; }
.tree-crown::before, .tree-crown::after { content:''; position:absolute; background:#66BB6A; border-radius:50%; }
.tree-crown::before { width:35px; height:35px; top:-12px; left:8px; }
.tree-crown::after { width:38px; height:30px; top:-3px; left:-8px; }
.tree-trunk { width:10px; height:24px; background:#795548; border-radius:0 0 4px 4px; margin:0 auto; }
.tree-label { font-size:.75em; color:#888; margin-top:4px; font-weight:600; }
.tw-cursor::after { content:'▎'; animation: blink .6s infinite; color:#3b82f6; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.tw-hidden { visibility:hidden; min-height:1.6em; }
/* Welcome screen */
.welcome-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg, #e0f0ff 0%, #f0e6ff 50%, #fff5e6 100%); z-index:1000; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; }
.welcome-overlay h1 { font-size:2em; }
.welcome-overlay .start-btn { padding:16px 40px; border-radius:20px; border:none; font-size:1.3em; font-weight:700; cursor:pointer; background:linear-gradient(135deg,#3b82f6,#8b5cf6); color:#fff; box-shadow:0 4px 20px rgba(59,130,246,.4); transition:.2s; }
.welcome-overlay .start-btn:active { transform:scale(.95); }
@media(max-width:400px){ .ej{font-size:1em;width:30px;height:30px;} .tree-crown{width:40px;height:32px;} .tree-crown::before{width:28px;height:28px;top:-10px;left:6px;} .tree-crown::after{width:30px;height:24px;top:-2px;left:-6px;} .tree-trunk{width:8px;height:18px;} }
</style>
</head>
<body>

<!-- Bug 2 fix: Welcome screen to unlock audio -->
<div class="welcome-overlay" id="welcomeScreen">
  <h1>🧮 数学思维训练</h1>
  <p style="color:#666;font-size:1.1em">数图标，找答案！</p>
  <button class="start-btn" onclick="startApp()">开始学习 🎯</button>
</div>

<div id="mainApp" style="display:none">

<div class="header">
  <h1>🧠 数学思维训练</h1>
  <p style="color:#888;font-size:.9em">数图标，找答案！</p>
</div>

<div class="tabs">
  <button class="tab active" data-t="0" onclick="switchTopic(0)">🚌 公交车 ⭐⭐⭐</button>
  <button class="tab" data-t="1" onclick="switchTopic(1)">💧 倒水 ⭐⭐⭐⭐</button>
  <button class="tab" data-t="2" onclick="switchTopic(2)">🐦 小鸟 ⭐⭐⭐⭐⭐</button>
</div>

<!-- ===== TOPIC 0: BUS ===== -->
<div id="topic0" class="topic-panel">
  <div class="card">
    <div class="question-box" id="q0-text"></div>
    <div class="progress" id="prog0"></div>
    <div id="bus-steps"></div>
  </div>
  <div class="practice-card" id="prac0">
    <div class="section-title">✏️ 练一练</div>
    <div class="question-box" id="pq0-text"></div>
    <div id="prac0-area"></div>
  </div>
</div>

<!-- ===== TOPIC 1: WATER ===== -->
<div id="topic1" class="topic-panel" style="display:none">
  <div class="card">
    <div class="question-box" id="q1-text"></div>
    <div class="progress" id="prog1"></div>
    <div id="water-steps"></div>
  </div>
  <div class="practice-card" id="prac1">
    <div class="section-title">✏️ 练一练</div>
    <div class="question-box" id="pq1-text"></div>
    <div id="prac1-area"></div>
  </div>
</div>

<!-- ===== TOPIC 2: BIRDS ===== -->
<div id="topic2" class="topic-panel" style="display:none">
  <div class="card">
    <div class="question-box" id="q2-text"></div>
    <div class="progress" id="prog2"></div>
    <div id="bird-steps"></div>
  </div>
  <div class="practice-card" id="prac2">
    <div class="section-title">✏️ 练一练</div>
    <div class="question-box" id="pq2-text"></div>
    <div id="prac2-area"></div>
  </div>
</div>

<canvas class="confetti" id="confetti"></canvas>

<div class="footer">🦎 Coco Learning Park · 数学思维训练</div>

</div><!-- mainApp -->

<script>
// ===== Bug 2: Welcome screen + audio unlock =====
let audioUnlocked = false;
function startApp() {
  // Unlock speech synthesis with silent utterance
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    speechSynthesis.speak(u);
  }
  audioUnlocked = true;
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = '';
  init();
}

// ===== Bug 3: Global timer tracking for cleanup =====
let activeTimers = [];
function clearAllTimers() {
  speechSynthesis.cancel();
  activeTimers.forEach(t => clearTimeout(t));
  activeTimers = [];
  // Also cancel any active typewriter
  if (twActive && twActive.timer) {
    clearInterval(twActive.timer);
    if (twActive.element) twActive.element.classList.remove('tw-cursor');
    twActive = null;
  }
}

// ===== Bug 1: Typewriter with dynamic speed matching TTS =====
let twActive = null;

function typewrite(element, text, speed) {
  return new Promise(resolve => {
    // Cancel any previous typewriter
    if (twActive && twActive.timer) {
      clearInterval(twActive.timer);
      if (twActive.element) twActive.element.classList.remove('tw-cursor');
    }
    
    element.textContent = '';
    element.style.visibility = 'visible';
    element.classList.add('tw-cursor');
    let i = 0;
    let skipped = false;
    let textDone = false;
    let ttsDone = false;

    // Strip emoji for cleaner TTS
    const ttsText = text.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '').trim();
    
    // Bug 1 fix: Calculate charDelay based on estimated TTS duration
    // Chinese TTS at rate=1.0 is roughly 5 chars/sec
    let charDelay;
    if (speed) {
      const estimatedDuration = ttsText.length / 5 * 1000;
      const ttsDelay = ttsText.length > 0 ? estimatedDuration / text.length : speed;
      charDelay = Math.max(ttsDelay, speed, 60);
    } else {
      const estimatedDuration = ttsText.length / 5 * 1000;
      charDelay = Math.max(estimatedDuration / text.length, 60);
    }
    
    function checkAllDone() {
      if (textDone && ttsDone) resolve();
    }

    // Start TTS
    if ('speechSynthesis' in window && ttsText && audioUnlocked) {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(ttsText);
      u.lang = 'zh-CN'; u.rate = 1.0;
      u.onend = function(){ ttsDone = true; checkAllDone(); };
      u.onerror = function(){ ttsDone = true; checkAllDone(); };
      speechSynthesis.speak(u);
    } else {
      ttsDone = true; // no TTS, mark done
    }

    function finish() {
      element.textContent = text;
      element.classList.remove('tw-cursor');
      twActive = null;
      textDone = true;
      checkAllDone();
    }

    // Click to skip
    function skipHandler() {
      if (!skipped) {
        skipped = true;
        clearInterval(timer);
        speechSynthesis.cancel();
        ttsDone = true;
        finish();
        element.removeEventListener('click', skipHandler);
      }
    }
    element.addEventListener('click', skipHandler);

    const timer = setInterval(() => {
      if (i < text.length) {
        element.textContent += text[i];
        i++;
      } else {
        clearInterval(timer);
        element.classList.remove('tw-cursor');
        element.removeEventListener('click', skipHandler);
        twActive = null;
        textDone = true;
        checkAllDone();
      }
    }, charDelay);

    twActive = { timer, element, skipHandler };
  });
}

// Simple speak (for manual buttons)
function speak(text) {
  if (!('speechSynthesis' in window) || !audioUnlocked) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 1.0;
  speechSynthesis.speak(u);
}

// Tracked setTimeout
function trackedTimeout(fn, ms) {
  const id = setTimeout(fn, ms);
  activeTimers.push(id);
  return id;
}

// ===== TABS (Bug 3: cancel speech + timers on switch) =====
let currentTopic = 0;
function switchTopic(t) {
  clearAllTimers(); // Bug 3 fix
  currentTopic = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', +b.dataset.t === t));
  document.querySelectorAll('.topic-panel').forEach((p,i) => p.style.display = i===t ? '' : 'none');
  // Hide practice cards when switching
  document.querySelectorAll('.practice-card').forEach(p => p.style.display = 'none');
  // Re-init
  if (t===0) { busEngine = new StepEngine('bus-steps','prog0', busSteps); typewriteQuestion(0); }
  if (t===1) { waterEngine = new StepEngine('water-steps','prog1', waterSteps); typewriteQuestion(1); }
  if (t===2) { birdEngine = new StepEngine('bird-steps','prog2', birdSteps); typewriteQuestion(2); }
}

// ===== CONFETTI =====
function showConfetti() {
  const c = document.getElementById('confetti');
  c.style.display = 'block';
  const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const pieces = Array.from({length:80}, () => ({
    x: Math.random()*c.width, y: -20-Math.random()*200,
    r: 4+Math.random()*6, color: ['#f44','#4a4','#48f','#fa4','#f4a','#4ff'][Math.floor(Math.random()*6)],
    vy: 2+Math.random()*3, vx: (Math.random()-.5)*3, rot: Math.random()*360
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    pieces.forEach(p => {
      p.y += p.vy; p.x += p.vx; p.rot += 3;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      ctx.restore();
    });
    if (++frame < 120) requestAnimationFrame(draw);
    else { ctx.clearRect(0,0,c.width,c.height); c.style.display='none'; }
  }
  draw();
}

// ===== EMOJI HELPERS =====
function makeCircles(emoji, count, cls='blue-bg') {
  return Array.from({length:count}, (_,i) =>
    `<span class="ej ${cls}" style="animation-delay:${i*60}ms">${emoji}</span>`
  ).join('');
}
function circleRow(emoji, count, cls='blue-bg', perRow=10) {
  let html = '';
  for (let i=0; i<count; i++) {
    if (i>0 && i%perRow===0) html += '<br>';
    html += `<span class="ej ${cls}" style="animation-delay:${i*50}ms">${emoji}</span>`;
  }
  return html;
}
function makeTree(label) {
  return `<div class="tree"><div class="tree-crown"></div><div class="tree-trunk"></div></div><div class="tree-label">${label}</div>`;
}
function treeWithBirds(label, blueCount, greenCount, redCount) {
  let birds = '';
  for(let i=0;i<blueCount;i++) birds += `<span class="ej blue-bg pop-in" style="animation-delay:${i*40}ms">🐦</span>`;
  for(let i=0;i<greenCount;i++) birds += `<span class="ej green-bg fly-in" style="animation-delay:${(blueCount+i)*40}ms">🐦</span>`;
  for(let i=0;i<redCount;i++) birds += `<span class="ej red-bg" style="animation-delay:${(blueCount+greenCount+i)*40}ms">🐦</span>`;
  return `<div class="tree-col"><div class="tree-birds">${birds}</div>${makeTree(label)}</div>`;
}

// ===== STEP ENGINE (Bug 4: auto-trigger first step after question typewrite) =====
class StepEngine {
  constructor(containerId, progressId, steps, onComplete) {
    this.container = document.getElementById(containerId);
    this.progEl = document.getElementById(progressId);
    this.steps = steps;
    this.current = 0;
    this.onComplete = onComplete;
    this.render();
  }
  render() {
    this.progEl.innerHTML = this.steps.map((_,i) =>
      `<div class="dot ${i<this.current?'done':''} ${i===this.current?'current':''}"></div>`
    ).join('');
    let html = '';
    this.steps.forEach((s,i) => {
      html += `<div class="step ${i===this.current?'active':''}" id="${this.container.id}-s${i}">${s.html(i===this.current)}</div>`;
    });
    this.container.innerHTML = html;
    // Run typewriter sequence for current step
    const step = this.steps[this.current];
    if (step && step.twSequence) {
      this.runTypewriterSequence(step.twSequence);
    }
  }
  async runTypewriterSequence(seq) {
    for (const item of seq) {
      const el = document.getElementById(item.id);
      if (!el) continue;
      await typewrite(el, item.text, item.speed || undefined);
      if (item.afterDelay) await new Promise(r => setTimeout(r, item.afterDelay));
      if (item.showAfter) {
        const targets = Array.isArray(item.showAfter) ? item.showAfter : [item.showAfter];
        targets.forEach(tid => {
          const t = document.getElementById(tid);
          if (t) t.style.display = '';
        });
      }
    }
  }
  checkAnswer(stepIdx, inputId, correct, onCorrect) {
    const v = parseInt(document.getElementById(inputId).value);
    const fbId = inputId + '-fb';
    const step = this.steps[stepIdx];
    if (v === correct) {
      const fbEl = document.getElementById(fbId);
      fbEl.className = 'feedback correct';
      const correctText = step.correctText || '太棒了！';
      fbEl.style.display = 'block';
      typewrite(fbEl, '✅ ' + correctText, 50).then(() => {
        if (onCorrect) trackedTimeout(onCorrect, 500);
      });
    } else {
      const fbEl = document.getElementById(fbId);
      fbEl.className = 'feedback wrong';
      fbEl.style.display = 'block';
      const hintText = step.hint || '再想想哦 💪';
      typewrite(fbEl, hintText, 50);
    }
  }
  next() {
    if (this.current < this.steps.length - 1) {
      this.current++;
      this.render();
    } else if (this.onComplete) {
      this.onComplete();
    }
  }
}

// ===== QUESTION TYPEWRITER (Bug 4: auto-start first step after question) =====
const questionTexts = [
  '🚌 一辆公共汽车，到第一站下车10人。到第二站下车的人数比第一站少5人。到第三站上来8人后，车上现有13人。原来有（ ？ ）人。',
  '💧 一桶水，第一次倒出一半，第二次又倒出剩下的一半，第三次又倒出5千克，桶里还剩2千克。原来有（ ？ ）千克。',
  '🐦 四棵树上共有40只鸟。第一棵树有3只飞到第二棵，第二棵有4只飞到第三棵，第三棵有5只飞到第四棵，最后一样多。第三棵树原来有（ ？ ）只。'
];
const practiceTexts = [
  '🚌 一辆公共汽车，到第一站下车6人。到第二站下车3人。到第三站上来4人后，车上现有10人。原来有（ ？ ）人。',
  '💧 一桶水，第一次倒出一半，第二次又倒出3千克，桶里还剩5千克。原来有（ ？ ）千克。',
  '🐦 三棵树上共30只鸟。第一棵树有2只飞到第二棵，第二棵有3只飞到第三棵，这样三棵树一样多。第二棵树原来有（ ？ ）只。'
];

// Bug 4 fix: after question typewrite completes, auto-trigger first step with 1s delay
function typewriteQuestion(t) {
  const el = document.getElementById('q'+t+'-text');
  if (el) {
    typewrite(el, questionTexts[t]).then(() => {
      // Auto-trigger first step after 1s delay
      trackedTimeout(() => {
        if (t===0 && busEngine) busEngine.runTypewriterSequence(busEngine.steps[0].twSequence);
        if (t===1 && waterEngine) waterEngine.runTypewriterSequence(waterEngine.steps[0].twSequence);
        if (t===2 && birdEngine) birdEngine.runTypewriterSequence(birdEngine.steps[0].twSequence);
      }, 1000);
    });
  }
}
function typewritePracticeQ(t) {
  const el = document.getElementById('pq'+t+'-text');
  if (el) return typewrite(el, practiceTexts[t]);
  return Promise.resolve();
}

  document.getElementById('prac'+t).style.display = 'block';
  document.getElementById('prac'+t).scrollIntoView({behavior:'smooth'});

    trackedTimeout(function(){
      if (t===0) initPrac0();
      if (t===1) initPrac1();
      if (t===2) initPrac2();
    }, 800);
  });
}

// ===== INIT (Bug 4: StepEngine render does NOT auto-run twSequence for step 0) =====
let busEngine, waterEngine, birdEngine;

// Override StepEngine to not auto-run twSequence on initial render (step 0)
// Only auto-run for steps > 0 (after user clicks "下一步")
const OrigStepEngine = StepEngine;

class PatchedStepEngine extends OrigStepEngine {
  constructor(containerId, progressId, steps, onComplete) {
    super(containerId, progressId, steps, onComplete);
  }
  render() {
    this.progEl.innerHTML = this.steps.map((_,i) =>
      `<div class="dot ${i<this.current?'done':''} ${i===this.current?'current':''}"></div>`
    ).join('');
    let html = '';
    this.steps.forEach((s,i) => {
      html += `<div class="step ${i===this.current?'active':''}" id="${this.container.id}-s${i}">${s.html(i===this.current)}</div>`;
    });
    this.container.innerHTML = html;
    // Only auto-run twSequence for steps AFTER the first one
    // Step 0's twSequence is triggered by typewriteQuestion callback
    if (this.current > 0) {
      const step = this.steps[this.current];
      if (step && step.twSequence) {
        this.runTypewriterSequence(step.twSequence);
      }
    }
  }
}

// Replace StepEngine
StepEngine = PatchedStepEngine;

function init() {
  busEngine = new StepEngine('bus-steps','prog0', busSteps);
  waterEngine = new StepEngine('water-steps','prog1', waterSteps);
  birdEngine = new StepEngine('bird-steps','prog2', birdSteps);
  // Bug 4: typewriteQuestion triggers first step's twSequence after question finishes
  typewriteQuestion(0);
}
